name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Homebrew packages
        id: cache-homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/var/homebrew/locks
          key: ${{ runner.os }}-homebrew-v1
          restore-keys: |
            ${{ runner.os }}-homebrew-

      - name: Install dependencies via Homebrew
        run: |
          brew install boost openssl@3 cmake
          echo "BOOST_ROOT=/opt/homebrew/opt/boost" >> $GITHUB_ENV
          echo "OPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3" >> $GITHUB_ENV

      - name: Clone libtorrent submodule
        run: |
          rm -rf LibTorrent-Swift/Thirdparty/libtorrent
          git clone --depth 1 --branch v2.0.11 https://github.com/arvidn/libtorrent.git LibTorrent-Swift/Thirdparty/libtorrent

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x' # Or use default stable channel
          channel: 'stable'
          cache: true

      - name: Build LibTorrent XCFramework
        run: |
          cd LibTorrent-Swift
          chmod +x make.sh
          
          # Run make.sh to generate CMake targets
          ./make.sh
          
          # Clean and archive iOS Device framework
          xcodebuild archive \
            -project LibTorrent.xcodeproj \
            -scheme LibTorrent \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "archives/LibTorrent-iOS.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
            
          # Clean and archive iOS Simulator framework (useful for local simulation)
          xcodebuild archive \
            -project LibTorrent.xcodeproj \
            -scheme LibTorrent \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -archivePath "archives/LibTorrent-iOS_Simulator.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
            
          # Package archives into a single XCFramework
          xcodebuild -create-xcframework \
            -archive archives/LibTorrent-iOS.xcarchive/Products/Library/Frameworks/LibTorrent.framework \
            -archive archives/LibTorrent-iOS_Simulator.xcarchive/Products/Library/Frameworks/LibTorrent.framework \
            -output build/LibTorrent.xcframework

      - name: Embed XCFramework into Flutter plugin
        run: |
          # Copy compiled framework to plugin's vendored folder
          mkdir -p libtorrent_bridge/ios/Frameworks
          cp -R LibTorrent-Swift/build/LibTorrent.xcframework libtorrent_bridge/ios/Frameworks/
          ls -la libtorrent_bridge/ios/Frameworks/LibTorrent.xcframework

      - name: Install Flutter dependencies
        run: |
          flutter pub get
          cd libtorrent_bridge
          flutter pub get

      - name: Resolve CocoaPods and pod install
        run: |
          cd ios
          # Prevent CocoaPods from searching global updates if cached, speeds up build
          pod install --repo-update

      - name: Build Unsigned IPA
        run: |
          # Build Flutter iOS IPA without signing profiles
          flutter build ipa --no-codesign

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoltTorrent-Unsigned-IPA
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
